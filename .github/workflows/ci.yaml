name: CI Pipeline

on: [push, pull_request]


jobs:
  quality-gate:
    name: Code Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black flake8 isort mypy pylint pytest

      - name: Format check with Black
        run: black --check src/ tests/ tools/

      - name: Import sort check with isort
        run: isort --check-only src/ tests/ tools/

      - name: Lint with Flake8
        run: flake8 src/ tests/ tools/ --max-line-length=100 --ignore=E203,W503

      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports --no-error-summary || true

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Security check with Bandit
        run: bandit -r src/ -ll || true

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: quality-gate
    if: always()
    steps:
      - name: Check CI status
        run: |
          if [ "${{ needs.quality-gate.result }}" == "success" ]; then
            echo "✅ All CI checks passed!"
            exit 0
          else
            echo "❌ Some CI checks failed"
            exit 1
          fi
