name: Linting

on: [push, pull_request]


jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install pylint flake8 isort

      - name: Run Flake8
        run: flake8 src/ tests/ tools/ --max-line-length=100 --ignore=E203,W503

      - name: Run Pylint
        run: pylint src/ tests/ tools/ --disable=missing-docstring --exit-zero

      - name: Check import sorting with isort
        run: isort --check-only --diff src/ tests/ tools/
