name: Complete CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

jobs:
  # ============================================================================
  # CODE QUALITY & FORMATTING
  # ============================================================================
  
  black:
    name: Code Formatting (Black)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Black
        run: pip install black

      - name: Check code formatting with Black
        run: black --check --verbose src/ tests/ tools/

      - name: Show formatting suggestions
        if: failure()
        run: black --diff src/ tests/ tools/

  # ============================================================================
  # LINTING & CODE ANALYSIS
  # ============================================================================

  linting:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install pylint flake8 isort

      - name: Run Flake8
        run: flake8 src/ tests/ tools/ --max-line-length=100 --ignore=E203,W503

      - name: Run Pylint
        run: pylint src/ tests/ tools/ --disable=missing-docstring --exit-zero

      - name: Check import sorting with isort
        run: isort --check-only --diff src/ tests/ tools/

  # ============================================================================
  # TYPE CHECKING
  # ============================================================================

  type-check:
    name: Type Checking
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy pyright types-requests

      - name: Run mypy type checker
        run: mypy src/ tests/ tools/ --ignore-missing-imports --no-error-summary || true

      - name: Run pyright
        run: pyright src/ || true

  # ============================================================================
  # SECURITY SCANNING
  # ============================================================================

  security-scan:
    name: Security Scan (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit security check
        run: bandit -r src/ -f json -o bandit-report.json || true

      - name: Display security report
        run: bandit -r src/ -ll

  # ============================================================================
  # DEPENDENCY SECURITY CHECK
  # ============================================================================

  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install safety pip-audit

      - name: Run Safety check for known vulnerabilities
        run: safety check --json || true

      - name: Run pip-audit for dependencies
        run: pip-audit --desc

      - name: Check for outdated packages
        run: pip list --outdated

  # ============================================================================
  # TESTING - MULTI VERSION
  # ============================================================================

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella-${{ matrix.python-version }}
          fail_ci_if_error: false

  # ============================================================================
  # FINAL STATUS CHECK
  # ============================================================================

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [black, linting, type-check, security-scan, dependency-check, tests]
    if: always()
    steps:
      - name: Check CI status
        run: |
          echo "========================================"
          echo "       CI/CD Pipeline Summary"
          echo "========================================"
          echo ""
          echo "Code Formatting (Black):        ${{ needs.black.result }}"
          echo "Linting (Flake8/Pylint/isort): ${{ needs.linting.result }}"
          echo "Type Checking:                 ${{ needs.type-check.result }}"
          echo "Security Scan (Bandit):        ${{ needs.security-scan.result }}"
          echo "Dependency Check:              ${{ needs.dependency-check.result }}"
          echo "Tests (Multi-version):         ${{ needs.tests.result }}"
          echo ""
          echo "========================================"
          
          if [ "${{ needs.black.result }}" = "failure" ] || \
             [ "${{ needs.linting.result }}" = "failure" ] || \
             [ "${{ needs.type-check.result }}" = "failure" ] || \
             [ "${{ needs.security-scan.result }}" = "failure" ] || \
             [ "${{ needs.dependency-check.result }}" = "failure" ] || \
             [ "${{ needs.tests.result }}" = "failure" ]; then
            echo "❌ Some CI checks failed"
            exit 1
          else
            echo "✅ All CI checks passed!"
            exit 0
          fi
